[build]
  command = "pip3 install --quiet openpyxl && python3 ci_build.py"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  SHEET_ID = "1vTqb5YX8pFjZxToGd2pJ_ncPbny2PXpW5gXx-7IlyZg"
  PYTHON_VERSION = "3.8"

[[redirects]]
  from = "/offerings.html"
  to = "/investments.html"
  status = 301
  force = true

[[redirects]]
  from = "/article-template.html"
  to = "/insights.html"
  status = 301
  force = true

[[redirects]]
  from = "/insight-1031-exchange-guide.html"
  to = "/1031-exchange-guide.html"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
