<script>
// ---- Article data binder ----
(function () {
  var el = document.getElementById('article-data');
  if (!el) return;
  var d;
  try { d = JSON.parse(el.textContent); } catch (e) { return; }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function paras(v) {
    var arr = Array.isArray(v) ? v : [v];
    return arr.map(function (p) { return '<p>' + esc(p) + '</p>'; }).join('');
  }
  function setAll(field, html) {
    document.querySelectorAll('[data-field="' + field + '"]').forEach(function (n) { n.innerHTML = html; });
  }

  if (d.title) { setAll('title', esc(d.title)); document.title = d.title + ' | Baker 1031 Investments'; }

  // meta line: category chip + date + read time with dot separators
  var metaParts = [];
  if (d.category) metaParts.push('<span class="cat">' + esc(d.category) + '</span>');
  var rest = [d.date, d.readTime].filter(Boolean).map(esc);
  if (rest.length) metaParts.push(rest.join(' <span class="dot">&middot;</span> '));
  setAll('meta', metaParts.join(' '));

  var body = '';
  if (d.intro) body += '<div class="article-intro">' + paras(d.intro) + '</div>';
  (d.sections || []).forEach(function (s, i) {
    body += '<h2 class="optima" id="sec-' + (i + 1) + '">' + esc(s.heading) + '</h2>' + paras(s.paragraphs);
  });
  setAll('body', body);

  // inject section titles into the TOC after the Article link
  var tocLinks = document.querySelector('#tocBanner .toc-links');
  if (tocLinks && d.sections) {
    var articleLink = tocLinks.querySelector('a[href="#article"]');
    d.sections.forEach(function (s, i) {
      var a = document.createElement('a');
      a.href = '#sec-' + (i + 1);
      a.textContent = s.heading;
      articleLink = articleLink ? articleLink.nextSibling : null;
      tocLinks.insertBefore(a, tocLinks.querySelector('a[href="#faq"]'));
    });
  }

  if (d.faqs) {
    setAll('faqs', d.faqs.map(function (f) {
      return '<details class="faq-item"><summary>' + esc(f.q) + '</summary><div class="answer">' + esc(f.a) + '</div></details>';
    }).join(''));
  }

  if (d.glossary) {
    setAll('glossary', d.glossary.map(function (g) {
      return '<div class="glossary-term"><dt>' + esc(g.term) + '</dt><dd>' + esc(g.definition) + '</dd></div>';
    }).join(''));
  }

  if (d.author) {
    var a = d.author;
    var photo = a.photo
      ? '<img class="author-photo" src="' + esc(a.photo) + '" alt="' + esc(a.name) + '">'
      : '<img class="author-photo" src="https://res.cloudinary.com/opoazlei/image/upload/v1783927734/jerry-baker_ovhy2w.jpg" alt="Gerald F. &quot;Jerry&quot; Baker, III">';
    setAll('authorBox',
      '<div class="author-box">' + photo + '<div>' +
      '<div class="a-name">' + esc(a.name) + '</div>' +
      '<div class="a-title">' + esc(a.title) + '</div>' +
      paras(a.bio) +
      (a.email ? '<a href="mailto:' + esc(a.email) + '">' + esc(a.email) + '</a>' : '') +
      '</div></div>');
  }
})();
</script>

<script>
// ---- Audio player: reads the article aloud with the Web Speech API ----
(function () {
  var toggle = document.getElementById('apToggle');
  var stopBtn = document.getElementById('apStop');
  var status = document.getElementById('apStatus');
  if (!toggle) return;
  if (!('speechSynthesis' in window)) {
    document.getElementById('audioPlayer').style.display = 'none';
    return;
  }

  var synth = window.speechSynthesis;
  var chunks = [], idx = 0, playing = false, started = false;

  function buildChunks() {
    chunks = [];
    var title = document.querySelector('.offering-hero h1');
    if (title) chunks.push(title.textContent);
    document.querySelectorAll('.article-body p, .article-body h2').forEach(function (n) {
      var t = n.textContent.trim();
      if (t) chunks.push(t);
    });
  }
  function speakNext() {
    if (idx >= chunks.length) { reset(); status.textContent = 'Finished.'; return; }
    var u = new SpeechSynthesisUtterance(chunks[idx]);
    u.rate = 1;
    u.onend = function () { if (playing) { idx++; speakNext(); } };
    synth.speak(u);
    status.textContent = 'Reading ' + (idx + 1) + ' of ' + chunks.length + '\u2026';
  }
  function reset() {
    synth.cancel();
    playing = false; started = false; idx = 0;
    toggle.innerHTML = '&#9654; Play';
    stopBtn.style.display = 'none';
  }
  toggle.addEventListener('click', function () {
    if (!started) {
      buildChunks();
      started = true; playing = true;
      toggle.innerHTML = '&#10074;&#10074; Pause';
      stopBtn.style.display = 'inline-block';
      speakNext();
    } else if (playing) {
      synth.pause();
      playing = false;
      toggle.innerHTML = '&#9654; Resume';
      status.textContent = 'Paused.';
    } else {
      synth.resume();
      playing = true;
      toggle.innerHTML = '&#10074;&#10074; Pause';
      status.textContent = 'Reading ' + (idx + 1) + ' of ' + chunks.length + '\u2026';
    }
  });
  stopBtn.addEventListener('click', function () { reset(); status.textContent = ''; });
  window.addEventListener('beforeunload', function () { synth.cancel(); });
})();
</script>

    clone.style.cssText = 'display:flex;flex-wrap:nowrap;gap:32px;position:absolute;visibility:hidden;width:auto;left:-9999px;';
    document.body.appendChild(clone);
    var w = clone.scrollWidth;
    document.body.removeChild(clone);
    return w;
  }
  function check() {
    var avail = banner.clientWidth - 32;
    if (neededWidth() > avail) { banner.classList.add('collapsed'); }
    else { banner.classList.remove('collapsed', 'open'); }
  }
  window.addEventListener('resize', check);
  check();
  links.addEventListener('click', function () { banner.classList.remove('open'); });
})();
