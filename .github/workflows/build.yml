name: Build and validate Baker 1031

on:
  push:
    branches: [main, portal-email-merge]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install build dependency
        run: python -m pip install --disable-pip-version-check openpyxl
      - name: Check Python syntax
        run: python -m py_compile ci_build.py scripts/generate-audio.py
      - name: Check whitespace
        run: git diff --check
      - name: Build and run validation gates
        run: python ci_build.py
      - name: Confirm discovery and search assets
        run: test -s dist/sitemap.xml && test -s dist/robots.txt && test -s dist/llms.txt && test -s dist/search-index.json
